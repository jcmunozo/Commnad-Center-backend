services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pmo
      POSTGRES_PASSWORD: pmo
      POSTGRES_DB: pmo
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      args:
        REQS: dev
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build:
      context: .
      args:
        REQS: dev
    command: celery -A config worker -l info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db

volumes:
  pgdata:
